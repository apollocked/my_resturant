name: my_resturant
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  image_cropper: ^12.2.1
  wechat_assets_picker: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: NRT
      fonts:
        - asset: assets/fonts/Nrt.ttf
