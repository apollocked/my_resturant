name: my_resturant
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  image_cropper: ^12.2.1
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.31
  path_provider: ^2.1.5
  path: ^1.9.1
  sqlite3: ^2.4.7
  shared_preferences: ^2.5.0
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  uuid: ^4.5.1
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^5.2.0
  fl_chart: ^1.2.0
  connectivity_plus: ^7.3.0
  flutter_image_compress: ^2.4.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^7.1.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

  fonts:
    - family: NRT
      fonts:
        - asset: assets/fonts/Nrt.ttf
